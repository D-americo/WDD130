<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - White Water Rafting</title>
    <meta name="description"
      content="Contact Us for more information about reservations, plans a much more adventure that rafting offer!!!">
    <meta name="author" content="Daniel Américo">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo.png" alt="rafting logo">
        <nav>
            <ul>
                <!--using ul and li leaves the header as a list one under other-->
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="company-info">
            <h1>Contact Information</h1>
            <p><strong>Address:</strong> Rua Doutor Dimas de Barros 65</p>
            <p><strong>Phone Number:</strong> +55 43 99191-6472</p>
            <p><strong>Email:</strong> Whitewaterrafting@wwr.com.br</p>
        </div>

        <section class="contact-area">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3663.4490638610228!2d-51.17884472489822!3d-23.335739978955502!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94eb434a6eda02f7%3A0x98a49a0dbee7845f!2sR.%20Dr.%20Dimas%20de%20Barros%2C%2065%20-%20Guanabara%2C%20Londrina%20-%20PR%2C%2086010-010!5e0!3m2!1spt-BR!2sbr!4v1775090312019!5m2!1spt-BR!2sbr"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <div class="contact-form">
                <form action="#" method="post">
                    <fieldset>
                        <label>
                            Name:
                            <input type="text" name="Name" required>
                        </label>
                        <label>
                            Email:
                            <input type="email" name="Email" required>
                        </label>
                    </fieldset>

                    <fieldset>
                        <label>Message Purpose:</label>
                        <label>
                            <input type="radio" name="purpose" value="general" required>
                            General Inquiry
                        </label>
                        <label>
                            <input type="radio" name="purpose" value="reservation">
                            Reservation Question
                        </label>
                        <label>
                            <input type="radio" name="purpose" value="suggestion">
                            Website Suggestion
                        </label>
                    </fieldset>

                    <fieldset>
                        <label>
                            Message:
                            <textarea name="Message" id="Message" placeholder="Type here"
                              required></textarea>
                        </label>
                        <label>
                            Please Subscribe me to the monthly newsletter
                            <input type="checkbox" name="newsletter">
                        </label>
                    </fieldset>


                    <button type="submit">Get in Touch!</button>

                </form>
            </div>
        </section>

        <section class="employees">
            <h2><strong>We Are Here to Serve You</strong></h2>
            <div class="employees-gallery">
                <figure>
                    <img src="images/employe1.jpg" alt="Portrait of Kassie, rafting guide">
                    <figcaption>Kessie – Senior Rafting Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/employe2.jpg" alt="Portrait of Robin, rafting guide">
                    <figcaption>Robbin – Senior Rafting Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/employe3.jpg" alt="Portrait of Carl, rafting guide">
                    <figcaption>Carl – Senior Rafting Guide and Video Maker</figcaption>
                </figure>
            </div>
        </section>


    </main>
    <footer>
        <p>©️2026 🌊 White Water Rafting 🌊 Daniel Américo </p>
        <nav class="socialmedia">
            <a href="https://www.facebook.com/daniel.americo.359">
                <img src="images/facebook-logo.png" alt="facebook Logo" width="50">
            </a>
            <a href="https://www.instagram.com/d_.americo/">
                <img src="images/instagram-logo.png" alt="Instagram Logo" width="50">
            </a>
            <a href="https://www.linkedin.com/in/daniel-am%C3%A9rico-a589a31b2/">
                <img src="images/linkdin-logo.png" alt="Linkdin Logo" width="50">
            </a>
        </nav>
    </footer>
</body>

</html>
