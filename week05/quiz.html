<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Quiz <Form></Form>
    </title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>
    <main class="box">
        <h1>☑️Basic HTML and CSS Quiz</h1>
        <form>
            <div class="quiz-item box">
                <!-- desse jeito não precisa nem de for e nem id, a pergunta vem antes e depois usa o input type e o name -->
                <label>
                    1. What does the acronym CSS stand for?
                    <input type="text" name="q1">
                </label>
            </div>
            <div class="quiz-item box">
                <label for="q2">2. How are Id and Class attributes selected in CSS?</label>
                <textarea name="" id="" type="text" id="q2" name="q2"></textarea>
            </div>
            <div class="quiz-item box">
                <label for="q3">3. Wich of the following is a valid CSS comment?</label>
                <select name="" id="" type="text" id="q3" name="q3">
                    <option value="" selected disabled>Choose one...</option>
                    <option value="A">A. &lt; !-- This is a comment -- &gt;</option>
                    <!-- foi usado &lt e &gt; pois ele fazer o simbolo de < > , se a gente tenta fazer isso no html ele entende como um comentario mas nesse caso so queremos colocar em uma pergunta de opções para a pessoa escolher-->
                    <option value="B">B. /* This is a comment */</option>
                    <option value="C">C. // This is a comment // </option>
                </select>
            </div>
            <div class="quiz-item box">
                <label for="q4">4. What is the bottom margin given this declaration?</label>
                <code class="box">margin: 10px 5px 15px;</code>
                <input type="text" id="q4" name="q4">
            </div>

            <button type="submit">Submit Quiz for Grading</button>
        </form>
    </main>
    <footer>
        <p>©️2026 | HTML Form - User Poll Activity | Daniel Américo</p>
    </footer>
</body>

</html>
