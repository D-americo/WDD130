<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poll Form</title>
</head>

<body>
    <header>
        <h1>WDD 130 | HTML Form - User Poll</h1>
    </header>
    <main>
        <form action="#" method="post">
            <label for="fullname"> User Full Name:</label>
            <input type="text" id="fullname" name="fullname" required>

            <label for="useremail"> User Email:</label>
            <input type="email" id="useremail" name="useremail" required>

            <label for="favoritebrowser">What is your favorite browser?</label>
            <select id="favoritebrowser" name="favoritebrowser">
                <option value="Chrome">Chrome</option>
                <option value="Safari">Safari</option>
                <option value="Edge">Edge</option>
                <option value="Other">Other</option>
            </select>
            <label for="pet">Do you have a household pet?</label>
            <input type="checkbox" name="pet" id="pet">
            <label for="feedback">List the places you have lived:</label>
            <textarea name="feedback" id="feedback"
              placeholder="Curitiba Parana-PR, Londrina-PR, São Paulo-SP, Maceio-AL, Aracaju-SE"
              rows="4"></textarea>
            <button type="submit">Submit Poll</button>
        </form>
    </main>
    <footer>
        <p>©️2026 | HTML Form - User Poll Activity | Daniel Américo</p>
    </footer>
</body>

</html>
